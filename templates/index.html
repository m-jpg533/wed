
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>位置紀錄器</title>
</head>
<body>

<h1>📍 我的時間軸</h1>

<button onclick="recordLocation()">記錄目前位置</button>

<p id="status"></p>

<script>
// 🌍 初始化地圖
let map = L.map('map').setView([25.03, 121.56], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker;

// 📡 自動追蹤位置
navigator.geolocation.watchPosition(
  function(position) {

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    console.log("📡 位置:", lat, lng);
    document.getElementById("status").innerText = "📍 定位中: " + lat + ", " + lng;

    // 📍 更新地圖標記
    if (marker) {
      marker.setLatLng([lat, lng]);
    } else {
      marker = L.marker([lat, lng]).addTo(map);
    }

    map.setView([lat, lng], 16);

    // 📤 傳送到後端（一定用完整網址）
    fetch('https://wed-hvh5.onrender.com/save-location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        latitude: lat,
        longitude: lng
      })
    })
    .then(res => res.json())
    .then(data => console.log("✅ 已送出", data))
    .catch(err => console.log("❌ 錯誤", err));

  },
  function(error) {
    console.log("❌ GPS錯誤", error);
    document.getElementById("status").innerText = "❌ 定位失敗";
  },
  {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
  }
);
</script>

</body>
</html>
