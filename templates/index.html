
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>位置紀錄器</title>
</head>
<body>

<h1>📍 我的時間軸</h1>

<button onclick="recordLocation()">記錄目前位置</button>

<p id="status"></p>

<script>
function recordLocation() {

  if (!navigator.geolocation) {
    alert("不支援定位");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {

      const data = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude
      };

      console.log("送出資料:", data);

      fetch('/save-location', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(res => {
        console.log("回傳:", res);
        document.getElementById("status").innerText = "✅ 已儲存";
      });

    },
    function(err) {
      console.log(err);
      document.getElementById("status").innerText = "❌ 定位失敗";
    },
    {
      enableHighAccuracy: true
    }
  );
}
</script>

</body>
</html>
