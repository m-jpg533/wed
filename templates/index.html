
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>📍 位置紀錄器</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    #map { height: 400px; width: 100%; margin-top: 10px; }
    button { padding: 10px 20px; font-size: 16px; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>📍 我的時間軸</h1>
  <button onclick="recordLocation()">記錄目前位置</button>
  <p id="status"></p>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // 🌍 初始化地圖
    let map = L.map('map').setView([25.03, 121.56], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    let marker;

    // 📤 傳送位置 + 更新地圖
    function sendPosition(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      console.log("📡 位置:", lat, lng);

      document.getElementById("status").innerText = "📍 " + lat.toFixed(6) + ", " + lng.toFixed(6);

      if (marker) {
        marker.setLatLng([lat, lng]);
      } else {
        marker = L.marker([lat, lng]).addTo(map);
      }
      map.setView([lat, lng], 16);

      // 🔥 傳送到後端
      fetch('https://wed-hvh5.onrender.com/save-location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ latitude: lat, longitude: lng })
      })
      .then(res => res.json())
      .then(data => console.log("✅ 已送出", data))
      .catch(err => console.log("❌ 傳送失敗", err));
    }

    function errorHandler(err) {
      console.log("❌ GPS錯誤:", err);
      document.getElementById("status").innerText = "❌ 定位失敗";
    }

    function recordLocation() {
      navigator.geolocation.getCurrentPosition(sendPosition, errorHandler, { enableHighAccuracy: true });
    }

    // 🚀 自動監控位置更新
    navigator.geolocation.watchPosition(sendPosition, errorHandler, { enableHighAccuracy: true, maximumAge: 1000 });
  </script>
</body>
</html>
