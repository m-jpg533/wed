
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>位置紀錄器</title>
</head>
<body>

<h1>📍 我的時間軸</h1>

<button onclick="recordLocation()">記錄目前位置</button>

<p id="status"></p>

<script>
// 🌍 初始化地圖
let map = L.map('map').setView([25.03, 121.56], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker;

// 📤 傳送位置 + 更新地圖
function sendPosition(position) {

  const lat = position.coords.latitude;
  const lng = position.coords.longitude;

  console.log("📡 位置:", lat, lng);

  // 顯示文字
  document.getElementById("status").innerText =
    "📍 " + lat.toFixed(6) + ", " + lng.toFixed(6);

  // 📍 地圖標記
  if (marker) {
    marker.setLatLng([lat, lng]);
  } else {
    marker = L.marker([lat, lng]).addTo(map);
  }

  map.setView([lat, lng], 16);

  // 📤 傳送到後端（一定用完整網址🔥）
  fetch('https://wed-hvh5.onrender.com/save-location', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      latitude: lat,
      longitude: lng
    })
  })
  .then(res => res.json())
  .then(data => console.log("✅ 已送出", data))
  .catch(err => console.log("❌ 傳送失敗", err));
}

// ❌ 錯誤處理
function errorHandler(err) {
  console.log("❌ GPS錯誤:", err);
  document.getElementById("status").innerText = "❌ 定位失敗";
}

// 🚀 啟動定位（第一次）
navigator.geolocation.getCurrentPosition(sendPosition, errorHandler, {
  enableHighAccuracy: true
});

// 🔥 強制每5秒抓一次（解決不更新問題）
setInterval(() => {
  navigator.geolocation.getCurrentPosition(sendPosition, errorHandler, {
    enableHighAccuracy: true
  });
}, 5000);

</script>

</body>
</html>
